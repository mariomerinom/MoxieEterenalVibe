# Multi-chain capture configuration.
# RPC URLs should reference env vars — actual keys in .env

[storage]
data_dir = "./data"
duckdb_path = "./data/mev.duckdb"
flush_interval_secs = 30
buffer_size = 100

[mevshare]
enabled = true
sse_url = "https://mev-share.flashbots.net"

[ground_truth]
eigenphi_enabled = true
eigenphi_api_key = "${EIGENPHI_API_KEY}"
zeromev_enabled = true

# --- Chains ---

[chains.ethereum]
enabled = true
rpc_http = "${ETH_RPC_HTTP}"
rpc_ws = "${ETH_RPC_WS}"
chain_id = 1
block_time_ms = 12000
requests_per_second = 25

