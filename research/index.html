<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEV Research</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }
    nav { margin-bottom: 2rem; display: flex; gap: 1rem; }
    nav a {
      color: #58a6ff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
    }
    nav a:hover, nav a.active { background: #161b22; border-color: #58a6ff; }
    h1 { color: #f0f6fc; border-bottom: 1px solid #21262d; padding-bottom: 0.5rem; }
    h2 { color: #f0f6fc; border-bottom: 1px solid #21262d; padding-bottom: 0.3rem; margin-top: 2rem; }
    h3 { color: #e6edf3; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
    th { background: #161b22; color: #f0f6fc; }
    tr:nth-child(even) { background: #0d1117; }
    tr:nth-child(odd) { background: #161b22; }
    code { background: #161b22; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre { background: #161b22; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    pre code { padding: 0; background: none; }
    hr { border: none; border-top: 1px solid #21262d; margin: 2rem 0; }
    strong { color: #e6edf3; }
    a { color: #58a6ff; }
    #content { min-height: 50vh; }
  </style>
</head>
<body>
  <nav>
    <a onclick="loadDoc('eth_mev_sizing.md')" id="nav-sizing">Business Sizing</a>
    <a onclick="loadDoc('execution_stack.md')" id="nav-stack">Execution Stack</a>
  </nav>
  <div id="content">Loading...</div>
  <script>
    async function loadDoc(file) {
      const resp = await fetch(file);
      const md = await resp.text();
      document.getElementById('content').innerHTML = marked.parse(md);
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      const id = file.includes('sizing') ? 'nav-sizing' : 'nav-stack';
      document.getElementById(id).classList.add('active');
    }
    loadDoc('eth_mev_sizing.md');
  </script>
</body>
</html>
